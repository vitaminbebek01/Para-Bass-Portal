<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Bass Pro - Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; display: flex; height: 100vh; }
        /* Sol Panel: Geçmiş */
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .history-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; position: relative; border: 1px solid #eee; cursor: pointer; }
        .history-item:hover { border-color: #00bfff; }
        .delete-btn { position: absolute; top: 5px; right: 5px; color: red; cursor: pointer; font-weight: bold; }
        
        /* Sağ Panel: Ana İşlem */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        h1 { color: #00bfff; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .row { display: flex; gap: 10px; margin-bottom: 20px; }
        .row > div { flex: 1; }

        button.action-btn { background-color: #48d1cc; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; }
        
        #resultPanel { display: none; margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        .result-box { background: #f1f1f1; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #00bfff; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; cursor: pointer; }
        #resImages img { width: 80px; height: 80px; object-fit: contain; margin: 5px; border: 1px solid #ddd; background: white; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Geçmiş Ürünler</h3>
        <div id="historyList">Yükleniyor...</div>
    </div>

    <div class="main-content">
        <div class="card">
            <h1>Para Bass Pro</h1>
            <p>E-Ticaret Operasyon Merkezi</p>

            <div class="form-group">
                <label>Trendyol Ürün Linki</label>
                <input type="text" id="urlInput" placeholder="https://www.trendyol.com/...">
            </div>

            <div class="row">
                <div>
                    <label>Kargo Firması</label>
                    <select id="carrierSelect">
                        <option value="aliexpress">AliExpress Standard</option>
                        <option value="fedex">FedEx Global</option>
                    </select>
                </div>
                <div>
                    <label>Ağırlık (Desi/KG)</label>
                    <select id="weightSelect">
                        </select>
                </div>
                <div>
                    <label>Ara Depo?</label>
                    <select id="warehouseSelect">
                        <option value="no">Hayır</option>
                        <option value="yes">Evet (+5$)</option>
                    </select>
                </div>
            </div>

            <button class="action-btn" onclick="startProcess()" id="submitBtn">Analiz Et ve Fiyatla</button>
            <div id="statusMessage" style="margin-top:15px; font-weight:bold;"></div>

            <div id="resultPanel">
                <div class="result-box">
                    <div style="font-size:11px; color:#888;">HESAPLANAN SATIŞ FİYATI</div>
                    <div id="resFinalPrice" style="font-size:24px; font-weight:bold; color:#2e8b57;">-</div>
                </div>
                <div class="result-box">
                    <button class="copy-btn" onclick="copyData('resTitle')">Kopyala</button>
                    <div style="font-size:11px; color:#888;">SEO BAŞLIĞI</div>
                    <div id="resTitle" style="font-size:14px;">-</div>
                </div>
                <div class="result-box">
                    <div style="font-size:11px; color:#888;">RESİMLER (Sürükle Bırak)</div>
                    <div id="resImages"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/u8d7j0zv94ywlp5zgjb3kzbivgy4j9ol";

        // Ağırlık seçimini doldur
        const weightSelect = document.getElementById('weightSelect');
        for(let i=0.1; i<=15; i = i < 1 ? +(i + 0.1).toFixed(1) : +(i + 0.5).toFixed(1)) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i + " kg";
            weightSelect.appendChild(opt);
        }

        async function startProcess() {
            const url = document.getElementById('urlInput').value;
            const carrier = document.getElementById('carrierSelect').value;
            const weight = document.getElementById('weightSelect').value;
            const warehouse = document.getElementById('warehouseSelect').value;
            
            if(!url) return alert("Link lazım kanka!");

            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMessage');
            
            btn.disabled = true;
            status.innerText = "⏳ İşleniyor...";

            try {
                const response = await fetch(MAKE_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        url: url, 
                        kargo: carrier, 
                        kg: weight, 
                        depo: warehouse 
                    })
                });

                if(response.ok) {
                    const resText = await response.text();
                    const parts = resText.split('|||');
                    
                    document.getElementById('resTitle').innerText = parts[0];
                    document.getElementById('resFinalPrice').innerText = parts[4] + " USD"; // Fiyatı 5. sıraya koyacağız
                    
                    // Resimler (JPG Çeviricili)
                    let rawImages = parts[5] || "";
                    let cleanImages = rawImages.match(/https?:\/\/[^\s"',]+/g);
                    const imgContainer = document.getElementById('resImages');
                    imgContainer.innerHTML = "";
                    cleanImages?.forEach(imgUrl => {
                        let img = document.createElement("img");
                        img.src = `https://wsrv.nl/?url=${encodeURIComponent(imgUrl)}&output=jpg`;
                        img.draggable = true;
                        imgContainer.appendChild(img);
                    });

                    document.getElementById('resultPanel').style.display = "block";
                    status.innerText = "✅ Başarılı!";
                    fetchHistory(); // Listeyi güncelle
                }
            } catch (e) {
                status.innerText = "❌ Hata!";
            } finally {
                btn.disabled = false;
            }
        }

        // Airtable'dan geçmişi çeken fonksiyon (Şimdilik boş, Make ile bağlayacağız)
        function fetchHistory() {
            console.log("Geçmiş güncelleniyor...");
        }

        function copyData(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("Kopyalandı!");
        }
    </script>
</body>
</html>
